<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.b { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1.5px; text-transform:uppercase; padding:4px 12px; border-radius:4px; display:inline-flex; align-items:center; gap:6px; }
.dot { width:4px; height:4px; border-radius:50%; }
.b.d-cy { background:rgba(0,217,255,.12); border:1px solid rgba(0,217,255,.25); color:#00D9FF; }
.b.d-li { background:rgba(179,255,107,.12); border:1px solid rgba(179,255,107,.25); color:#B3FF6B; }
.b.d-or { background:rgba(255,122,71,.12); border:1px solid rgba(255,122,71,.25); color:#FF7A47; }
.b.d-pu { background:rgba(196,163,255,.12); border:1px solid rgba(196,163,255,.25); color:#C4A3FF; }
.b.l-cy { background:rgba(59,130,246,.20); border:1px solid rgba(59,130,246,.4); color:#fff; }
.b.l-li { background:rgba(34,197,94,.20); border:1px solid rgba(34,197,94,.4); color:#fff; }
.b.l-or { background:rgba(245,158,11,.20); border:1px solid rgba(245,158,11,.4); color:#fff; }
.b.l-pu { background:rgba(139,92,246,.20); border:1px solid rgba(139,92,246,.4); color:#fff; }
</style></head>
<body>
<div class="card">
  <div class="pane dark" style="padding:24px">
    <div class="eyebrow" style="margin-bottom:14px">DARK · STATUS BADGES</div>
    <div class="row">
      <span class="b d-cy"><span class="dot" style="background:#00D9FF"></span>ONLINE</span>
      <span class="b d-li"><span class="dot" style="background:#B3FF6B"></span>ACTIVE</span>
      <span class="b d-or"><span class="dot" style="background:#FF7A47"></span>WARNING</span>
      <span class="b d-pu"><span class="dot" style="background:#C4A3FF"></span>INFO</span>
    </div>
  </div>
  <div class="pane light" style="padding:24px">
    <div class="eyebrow" style="margin-bottom:14px;color:#475569">LIGHT · STATUS BADGES</div>
    <div class="row">
      <span class="b l-cy"><span class="dot" style="background:#fff"></span>ONLINE</span>
      <span class="b l-li"><span class="dot" style="background:#fff"></span>ACTIVE</span>
      <span class="b l-or"><span class="dot" style="background:#fff"></span>WARNING</span>
      <span class="b l-pu"><span class="dot" style="background:#fff"></span>INFO</span>
    </div>
  </div>
</div>
</body></html>
