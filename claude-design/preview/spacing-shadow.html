<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="pane dark" style="padding:24px">
    <div class="eyebrow" style="margin-bottom:18px">DARK · GLOW (NO SHADOW)</div>
    <div style="display:flex;gap:14px;align-items:center;justify-content:center;height:90px">
      <div style="background:#0F1419;border:1px solid rgba(0,200,255,.35);box-shadow:0 0 25px rgba(0,200,255,.30);width:80px;height:60px;border-radius:8px"></div>
      <div style="background:#0F1419;border:1px solid rgba(179,255,107,.35);box-shadow:0 0 25px rgba(179,255,107,.30);width:80px;height:60px;border-radius:8px"></div>
      <div style="background:#0F1419;border:1px solid rgba(255,122,71,.35);box-shadow:0 0 25px rgba(255,122,71,.30);width:80px;height:60px;border-radius:8px"></div>
    </div>
    <div class="swatch-hex" style="color:#A8B3C5;text-align:center;margin-top:10px">--shadow-glow · 25px halo</div>
  </div>
  <div class="pane light" style="padding:24px">
    <div class="eyebrow" style="margin-bottom:18px;color:#475569">LIGHT · SHADOW (SKY-TINTED)</div>
    <div style="display:flex;gap:14px;align-items:center;justify-content:center;height:90px">
      <div style="background:#fff;width:60px;height:50px;border-radius:8px;box-shadow:0 1px 3px 0 rgba(125,211,252,.15)"></div>
      <div style="background:#fff;width:60px;height:50px;border-radius:8px;box-shadow:0 4px 8px -2px rgba(125,211,252,.25)"></div>
      <div style="background:#fff;width:60px;height:50px;border-radius:8px;box-shadow:0 10px 20px -5px rgba(125,211,252,.30)"></div>
      <div style="background:#fff;width:60px;height:50px;border-radius:8px;box-shadow:0 20px 35px -8px rgba(125,211,252,.35)"></div>
    </div>
    <div class="swatch-hex" style="color:#475569;text-align:center;margin-top:10px">sm · md · lg · xl</div>
  </div>
</div>
</body></html>
