<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card single" style="grid-template-columns:1fr 1fr">
  <div class="pane dark" style="padding:0">
    <div style="height:100%;background:linear-gradient(135deg,#0A0E1A 0%,#1A2B4E 50%,#00c8ff 100%);padding:20px 24px">
      <div class="eyebrow" style="margin-bottom:8px">GRADIENT-BLUE-SOFT (DARK)</div>
      <div class="swatch-name" style="color:#fff">HERO · IMMERSIVE</div>
      <div class="swatch-hex" style="color:rgba(255,255,255,.7)">#0A0E1A → #1A2B4E → #00c8ff</div>
    </div>
  </div>
  <div class="pane light" style="padding:0">
    <div style="height:100%;background:linear-gradient(135deg,#DBEAFE 0%,#E0E7FF 33%,#F3E8FF 66%,#FEF3C7 100%);padding:20px 24px">
      <div class="eyebrow" style="margin-bottom:8px;color:#475569">GRADIENT-MULTI (LIGHT)</div>
      <div class="swatch-name" style="color:#1A1F3A">FULL-PAGE BACKGROUND</div>
      <div class="swatch-hex" style="color:#475569">sky → indigo → lavender → cream</div>
    </div>
  </div>
</div>
</body></html>
