<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="pane dark">
    <div class="eyebrow" style="margin-bottom:14px">DARK · NEON SCI-FI</div>
    <div class="swatch-stack">
      <div><div class="swatch" style="background:#00D9FF;box-shadow:0 0 18px rgba(0,217,255,.35)"></div>
        <div class="swatch-label"><span class="swatch-name" style="color:#00D9FF">CYAN</span><span class="swatch-hex">#00D9FF</span></div></div>
      <div><div class="swatch" style="background:#B3FF6B;box-shadow:0 0 18px rgba(179,255,107,.35)"></div>
        <div class="swatch-label"><span class="swatch-name" style="color:#B3FF6B">LIME</span><span class="swatch-hex">#B3FF6B</span></div></div>
      <div><div class="swatch" style="background:#FF7A47;box-shadow:0 0 18px rgba(255,122,71,.35)"></div>
        <div class="swatch-label"><span class="swatch-name" style="color:#FF7A47">ORANGE</span><span class="swatch-hex">#FF7A47</span></div></div>
      <div><div class="swatch" style="background:#C4A3FF;box-shadow:0 0 18px rgba(196,163,255,.35)"></div>
        <div class="swatch-label"><span class="swatch-name" style="color:#C4A3FF">PURPLE</span><span class="swatch-hex">#C4A3FF</span></div></div>
    </div>
  </div>
  <div class="pane light">
    <div class="eyebrow" style="margin-bottom:14px;color:#475569">LIGHT · PASTEL MODERN</div>
    <div class="swatch-stack">
      <div><div class="swatch" style="background:#7DD3FC"></div>
        <div class="swatch-label"><span class="swatch-name" style="color:#0369A1">CYAN</span><span class="swatch-hex" style="color:#475569">#7DD3FC</span></div></div>
      <div><div class="swatch" style="background:#BEF264"></div>
        <div class="swatch-label"><span class="swatch-name" style="color:#166534">LIME</span><span class="swatch-hex" style="color:#475569">#BEF264</span></div></div>
      <div><div class="swatch" style="background:#FDBA74"></div>
        <div class="swatch-label"><span class="swatch-name" style="color:#9A3412">ORANGE</span><span class="swatch-hex" style="color:#475569">#FDBA74</span></div></div>
      <div><div class="swatch" style="background:#C4B5FD"></div>
        <div class="swatch-label"><span class="swatch-name" style="color:#5B21B6">PURPLE</span><span class="swatch-hex" style="color:#475569">#C4B5FD</span></div></div>
    </div>
  </div>
</div>
</body></html>
