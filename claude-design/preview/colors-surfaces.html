<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="pane dark">
    <div class="eyebrow" style="margin-bottom:12px">DARK · SURFACES</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:#0A0E1A;border:1px solid rgba(0,180,255,.13);border-radius:6px;padding:14px">
        <div class="swatch-name" style="color:#E8ECF2">BACKGROUND</div>
        <div class="swatch-hex" style="color:#A8B3C5">#0A0E1A</div></div>
      <div style="background:#0F1419;border:1px solid rgba(0,180,255,.13);border-radius:6px;padding:14px">
        <div class="swatch-name" style="color:#E8ECF2">CARD</div>
        <div class="swatch-hex" style="color:#A8B3C5">#0F1419</div></div>
      <div style="background:#1A2433;border:1px solid rgba(0,180,255,.13);border-radius:6px;padding:14px">
        <div class="swatch-name" style="color:#E8ECF2">MUTED</div>
        <div class="swatch-hex" style="color:#A8B3C5">#1A2433</div></div>
      <div style="background:#0F1419;border:1px solid rgba(0,200,255,.35);border-radius:6px;padding:14px">
        <div class="swatch-name" style="color:#E8ECF2">BORDER-BRIGHT</div>
        <div class="swatch-hex" style="color:#A8B3C5">cyan 35%</div></div>
    </div>
  </div>
  <div class="pane light">
    <div class="eyebrow" style="margin-bottom:12px;color:#475569">LIGHT · SURFACES</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:#F8F9FE;border:1px solid rgba(125,211,252,.25);border-radius:6px;padding:14px">
        <div class="swatch-name" style="color:#1A1F3A">BACKGROUND</div>
        <div class="swatch-hex" style="color:#475569">#F8F9FE</div></div>
      <div style="background:#FFFFFF;border:1px solid rgba(125,211,252,.25);border-radius:6px;padding:14px">
        <div class="swatch-name" style="color:#1A1F3A">CARD</div>
        <div class="swatch-hex" style="color:#475569">#FFFFFF</div></div>
      <div style="background:#E0E7FF;border:1px solid rgba(125,211,252,.25);border-radius:6px;padding:14px">
        <div class="swatch-name" style="color:#1A1F3A">MUTED</div>
        <div class="swatch-hex" style="color:#475569">#E0E7FF</div></div>
      <div style="background:#FFFFFF;border:1px solid rgba(125,211,252,.45);border-radius:6px;padding:14px">
        <div class="swatch-name" style="color:#1A1F3A">BORDER-BRIGHT</div>
        <div class="swatch-hex" style="color:#475569">sky 45%</div></div>
    </div>
  </div>
</div>
</body></html>
